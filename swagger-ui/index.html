<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>messpunkt.io Partner API — Swagger UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Swagger UI view of the messpunkt.io Partner API — endpoint list + try-it-out." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='54' font-size='56'%3E%F0%9F%94%8C%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      html, body { margin: 0; padding: 0; background: #fafafa; }
      .viewer-bar {
        background: #f1f5f9;
        color: #334155;
        padding: 10px 24px;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        border-bottom: 1px solid #e2e8f0;
      }
      .viewer-bar a { color: #0f766e; text-decoration: underline; margin: 0 6px; }
      .viewer-bar strong { color: #0f172a; }
      .draft-banner {
        background: #fef3c7;
        color: #92400e;
        padding: 10px 24px;
        text-align: center;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        border-bottom: 1px solid #fde68a;
      }
    </style>
  </head>
  <body>
    <div class="viewer-bar">
      <strong>Viewer:</strong> Swagger UI ·
      <a href="../">Redoc (narrative docs)</a> ·
      <a href="../scalar/">Scalar (modern, with code samples)</a> ·
      <a href="../erp-api-openapi.yaml">Raw OpenAPI YAML</a>
    </div>
    <div class="draft-banner">
      ⚠ <strong>Draft concept · not implemented.</strong>
      This specification is shared for partner review and feedback. Status: 2026-04 · draft 0.1.
    </div>
    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = function () {
        window.ui = SwaggerUIBundle({
          url: "../erp-api-openapi.yaml",
          dom_id: "#swagger-ui",
          deepLinking: true,
          docExpansion: "list",
          defaultModelsExpandDepth: 0,
          tryItOutEnabled: true,
          persistAuthorization: true,
          validatorUrl: null,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          plugins: [SwaggerUIBundle.plugins.DownloadUrl],
          layout: "StandaloneLayout"
        });
      };
    </script>
  </body>
</html>
