    name: messpunkt.io Partnerships
    email: kontakt@messpunkt.io
    url: https://messpunkt.io
  termsOfService: https://messpunkt.io/impressum
  x-logo:
    url: ./assets/messpunkt-quer.svg
    altText: messpunkt.io
